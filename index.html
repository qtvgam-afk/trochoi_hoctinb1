<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Code Arena – Robot Coding</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF4ED;
  --surface:#FFFDFB;
  --surface2:#F7EBE0;
  --surface3:#F0DFC9;
  --accent:#C75D2C;
  --accent2:#D97A4A;
  --warm:#D9824D;
  --gold:#C6922E;
  --green:#3F9142;
  --red:#C0392B;
  --blue:#3B6FB5;
  --teal:#3D8C82;
  --text:#4A2A12;
  --muted:#A66B43;
  --border:#E8CBA8;
  --shadow:rgba(199,93,44,.10);
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}

/* Warm decorative background */
.bg-deco{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg-deco::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(217,130,77,.1),transparent 70%)}
.bg-deco::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(61,140,130,.08),transparent 70%)}

#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:12px 12px 80px}

.header{text-align:center;padding:14px 0 6px}
.logo{font-size:24px;font-weight:900;background:linear-gradient(135deg,#C75D2C,#D9824D,#C6922E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px}
.subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}

/* Timer bar */
.timer-bar{position:fixed;top:0;left:0;width:100%;height:5px;background:var(--border);z-index:100}
.timer-fill{height:100%;background:linear-gradient(90deg,#C75D2C,#C6922E);transition:width 1s linear;border-radius:0 2px 2px 0}
.timer-display{position:fixed;top:8px;right:12px;z-index:101;background:rgba(255,255,255,.95);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:var(--accent);font-family:'Nunito',sans-serif;box-shadow:0 2px 8px var(--shadow)}
.timer-display.urgent{color:var(--red);animation:pulse-red .6s infinite}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.5}}

/* Arena robots */
.arena{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:6px 0 10px}
.robot-wrap{flex-shrink:0;position:relative}
.robot-wrap svg{width:68px;height:84px;filter:drop-shadow(0 4px 12px rgba(199,93,44,.2))}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 4px 20px var(--shadow)}
.card-title{font-size:12px;font-weight:800;color:var(--warm);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}

/* Tab row */
.tab-row{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;text-align:center;transition:.2s;font-weight:700}
.tab.active{border-color:var(--accent);color:var(--accent);background:rgba(199,93,44,.08)}
.tab.done{border-color:var(--green);color:var(--green);background:rgba(63,145,66,.08)}

.question-badge{display:inline-block;background:linear-gradient(135deg,rgba(199,93,44,.15),rgba(198,146,46,.15));color:var(--accent);border-radius:10px;padding:4px 12px;font-size:11px;font-weight:800;margin-bottom:10px;border:1px solid rgba(199,93,44,.2)}
.question-text{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:12px}

.editor-wrap{position:relative}
.editor-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'Fira Code',monospace;font-weight:600}
textarea{width:100%;min-height:120px;background:#FBF3EC;border:1.5px solid var(--border);border-radius:12px;color:#4A2A12;font-family:'Fira Code',monospace;font-size:13px;padding:12px;resize:vertical;outline:none;line-height:1.6;transition:.2s}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,93,44,.1)}
textarea.success{border-color:var(--green);background:rgba(63,145,66,.04)}
textarea.error{border-color:var(--red);background:rgba(192,57,43,.04)}

.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#C75D2C,#D9824D);color:#fff;box-shadow:0 4px 16px rgba(199,93,44,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(199,93,44,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface2);color:var(--muted);border:1.5px solid var(--border)}
.btn-next{background:linear-gradient(135deg,var(--green),#15803D);color:#fff;box-shadow:0 4px 12px rgba(63,145,66,.25)}
.btn-teacher{background:linear-gradient(135deg,#6D4FC2,#4F3A93);color:#fff;box-shadow:0 4px 16px rgba(109,79,194,.3);font-size:13px}

.result-box{border-radius:14px;padding:14px;margin-top:10px;display:none}
.result-box.show{display:block}
.result-box.pass{background:rgba(63,145,66,.08);border:1.5px solid rgba(63,145,66,.25)}
.result-box.fail{background:rgba(192,57,43,.08);border:1.5px solid rgba(192,57,43,.25)}
.result-score{font-size:30px;font-weight:900;margin-bottom:6px}
.result-score.pass{color:var(--green)}
.result-score.fail{color:var(--red)}
.result-fb{font-size:13px;line-height:1.6;color:var(--text)}

.loading-dots{display:inline-flex;gap:4px;align-items:center}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:currentColor;animation:dot .9s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

.name-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;margin-bottom:10px}
.name-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,93,44,.1)}

.leaderboard{display:flex;flex-direction:column;gap:6px}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:12px;border:1.5px solid var(--border)}
.lb-rank{font-size:16px;width:28px;text-align:center}
.lb-name{flex:1;font-weight:700;font-size:14px;color:var(--text)}
.lb-score{font-weight:900;font-size:16px}
.lb-time{font-size:11px;color:var(--muted)}
.lb-score.gold{color:#B8860B}
.lb-score.silver{color:#6B7280}
.lb-score.bronze{color:#92400E}

.finish-banner{text-align:center;padding:20px 16px}
.finish-title{font-size:24px;font-weight:900;margin-bottom:6px;color:var(--text)}
.finish-sub{font-size:14px;color:var(--muted);margin-bottom:16px;font-weight:600}
.total-score{font-size:56px;font-weight:900;background:linear-gradient(135deg,#C75D2C,#C6922E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C75D2C,#C6922E);border-radius:3px;transition:width .5s}

.hint-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;padding:0;margin-left:8px;font-weight:700}
.hint-box{background:rgba(217,130,77,.08);border:1.5px solid rgba(217,130,77,.25);border-radius:10px;padding:10px 12px;font-size:12px;color:#7C2D12;margin-top:8px;font-family:'Fira Code',monospace;display:none}
.hint-box.show{display:block}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes excited{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes idle-float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(1deg)}}
.robot-bounce{animation:bounce 2s ease-in-out infinite}
.robot-excited{animation:excited .6s ease-in-out infinite}
.robot-idle{animation:idle-float 3s ease-in-out infinite}

/* ===== WAITING SCREEN ===== */
.wait-screen{text-align:center;padding:10px 0}
.wait-title{font-size:20px;font-weight:900;color:var(--accent);margin-bottom:4px}
.wait-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:16px}

/* Player robo card */
.player-robo-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:14px 12px;text-align:center;position:relative;box-shadow:0 4px 16px var(--shadow)}
.player-robo-card.me{border-color:var(--accent)}
.player-name-tag{font-size:13px;font-weight:800;color:var(--text);margin-top:8px;background:var(--surface2);border-radius:8px;padding:4px 10px;display:inline-block}
.player-status{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}
.player-status.ready{color:var(--green)}
.ready-badge{position:absolute;top:-6px;right:-6px;background:var(--green);color:#fff;font-size:10px;font-weight:800;border-radius:20px;padding:2px 7px}

/* Waiting room grid */
.wait-room{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin:12px 0}

/* Countdown overlay */
.countdown-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(251,244,237,.92);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column}
.countdown-num{font-size:120px;font-weight:900;background:linear-gradient(135deg,#C75D2C,#C6922E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:count-pop .8s ease-out;line-height:1}
@keyframes count-pop{0%{transform:scale(2);opacity:0}60%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
.countdown-label{font-size:18px;font-weight:800;color:var(--muted);margin-top:8px}

/* Total score board screen */
.score-board-screen .board-entry{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:var(--surface);border:1.5px solid var(--border);margin-bottom:8px;box-shadow:0 2px 8px var(--shadow)}
.teacher-panel{background:linear-gradient(135deg,rgba(109,79,194,.08),rgba(79,58,147,.06));border:1.5px solid rgba(109,79,194,.2);border-radius:16px;padding:14px;margin-bottom:12px}
.teacher-label{font-size:11px;font-weight:800;color:#6D4FC2;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}

.emoji-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:150}
.e-particle{position:absolute;top:-30px;font-size:24px;animation:rain-fall linear forwards}
@keyframes rain-fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>

<script>
// ===== FIREBASE CONFIG chuẩn của bạn =====
const firebaseConfig = { 
  apiKey : "AIzaSyCbes_q1vRtaqRdzgi9BRKfgcQXh67tPOM" , 
  authDomain : "codingtrochoi.firebaseapp.com" , 
  databaseURL : "https://codingtrochoi-default-rtdb.asia-southeast1.firebasedatabase.app" , 
  projectId : "codingtrochoi" , 
  storageBucket : "codingtrochoi.firebasestorage.app" , 
  messagingSenderId : "682497417035" , 
  appId : "1:682497417035:web:f88c724d44af1ea17092ce" , 
  measurementId : "G-J5W0JZ3E28" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ARENA_ROOT = 'code_arena_v3';
const TOTAL_SECONDS = 300; // 5 phút

const ROBOT_COLORS = [
  {main:'#C75D2C',eye:'#C6922E',body:'#F7EBE0',border:'#C75D2C'},
  {main:'#6D4FC2',eye:'#9C89D9',body:'#F0ECF7',border:'#6D4FC2'},
  {main:'#3F9142',eye:'#7FC98A',body:'#EAF5EC',border:'#3F9142'},
  {main:'#3B6FB5',eye:'#7CA8DE',body:'#EDF2F8',border:'#3B6FB5'},
];

function getRobotColor(name) {
  let hash = 0; for(let c of name) hash = (hash*31 + c.charCodeAt(0)) & 0xFFFF;
  return ROBOT_COLORS[hash % ROBOT_COLORS.length];
}

function makeRobot(name, size=56, mood='idle') {
  const c = getRobotColor(name);
  const anim = mood==='excited' ? 'robot-excited' : mood==='wave' ? 'robot-bounce' : 'robot-idle';
  return `<svg width="${size}" height="${Math.round(size*1.25)}" viewBox="0 0 64 80" fill="none" class="${anim}">
    <rect x="24" y="0" width="16" height="6" rx="3" fill="${c.main}"/>
    <rect x="10" y="6" width="44" height="30" rx="9" fill="${c.body}" stroke="${c.border}" stroke-width="2"/>
    <circle cx="24" cy="20" r="6.5" fill="${c.body}" stroke="${c.main}" stroke-width="1.5"/>
    <circle cx="24" cy="20" r="3" fill="${c.main}"/>
    <circle cx="40" cy="20" r="6.5" fill="${c.body}" stroke="${c.eye}" stroke-width="1.5"/>
    <circle cx="40" cy="20" r="3" fill="${c.eye}"/>
    <rect x="8" y="36" width="48" height="26" rx="9" fill="${c.body}" stroke="${c.border}" stroke-width="2"/>
  </svg>`;
}

const questions = [
  {
    id:1, title:'Hàm tính tổng',
    desc:'Viết hàm <code>sum(a, b)</code> nhận 2 tham số là số tự nhiên, trả về tổng của chúng.',
    hint:'function sum(a, b) {\n  return a + b;\n}',
    placeholder:'// Viết hàm sum() ở đây\n',
    testPrompt: `Học sinh viết hàm sum(a,b) trả về tổng 2 số. Code:\n{CODE}\nChấm từ 0-10. Trả về JSON thuần: {"score":X,"pass":true/false,"feedback":"Nhận xét ngắn gọn","emoji":"✅"}`
  },
  {
    id:2, title:'Giới thiệu bản thân',
    desc:'Viết hàm <code>introduce()</code> in ra tên, tuổi, sở thích của bạn qua console.log.',
    hint:'function introduce() {\n  console.log("Tên: An");\n}',
    placeholder:'// Viết hàm introduce() ở đây\n',
    testPrompt: `Học sinh viết hàm introduce() in ra thông tin. Code:\n{CODE}\nChấm từ 0-10. Trả về JSON thuần: {"score":X,"pass":true/false,"feedback":"Nhận xét ngắn gọn","emoji":"✅"}`
  }
];

let state = {
  screen: 'name', playerName: '', currentQ: 0,
  codes: ['',''], scores: [null,null], feedbacks: [null,null],
  startTime: null, submitting: false, secondsLeft: TOTAL_SECONDS, timerInterval: null
};

// Quản lý các kết nối lắng nghe Firebase Realtime
let gameStartedRef = null;
let waitingRef = null;

function startWaitingListeners() {
  stopWaitingListeners(); // Xóa sạch listener cũ trước khi tạo mới

  // 1. Lắng nghe REALTIME trạng thái kích hoạt trận đấu từ Giáo viên
  gameStartedRef = db.ref(`${ARENA_ROOT}/gameStarted`);
  gameStartedRef.on('value', (snapshot) => {
    const started = snapshot.val();
    if (started === 1 && state.screen === 'waiting') {
      stopWaitingListeners();
      startCountdown();
    }
  }, (err) => { console.error("Lỗi Realtime gameStarted:", err); });

  // 2. Lắng nghe REALTIME danh sách học sinh tham gia vào phòng chờ công khai
  waitingRef = db.ref(`${ARENA_ROOT}/waiting`);
  waitingRef.on('value', (snapshot) => {
    const players = snapshot.val() || [];
    const grid = document.getElementById('waitGrid');
    if (grid && state.screen === 'waiting') {
      grid.innerHTML = players.map(name => `
        <div class="player-robo-card${name===state.playerName?' me':''}">
          ${name===state.playerName?'<div class="ready-badge">Bạn</div>':''}
          ${makeRobot(name, 50, 'wave')}
          <div class="player-name-tag">${name.length>8?name.slice(0,8)+'…':name}</div>
          <div class="player-status ready">✓ Sẵn sàng</div>
        </div>`).join('');
    }
  }, (err) => { console.error("Lỗi Realtime waiting list:", err); });
}

function stopWaitingListeners() {
  if (gameStartedRef) { gameStartedRef.off(); gameStartedRef = null; }
  if (waitingRef) { waitingRef.off(); waitingRef = null; }
}

async function getBoard() {
  try { const snap = await db.ref(`${ARENA_ROOT}/board`).once('value'); return snap.val() || []; } catch(e) { return []; }
}

async function saveScore(name, score, time) {
  try {
    let board = await getBoard();
    board = board.filter(p => p.name !== name);
    board.push({name, score, time, ts: new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})});
    board.sort((a,b) => b.score-a.score || a.time-b.time);
    await db.ref(`${ARENA_ROOT}/board`).set(board.slice(0,20));
  } catch(e){ console.error("Không thể lưu điểm:", e); }
}

function startTimer(onDone) {
  state.secondsLeft = TOTAL_SECONDS;
  document.getElementById('timerDisplay').style.display = 'block';
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.secondsLeft--;
    const m = Math.floor(state.secondsLeft/60);
    const s = String(state.secondsLeft%60).padStart(2,'0');
    const disp = document.getElementById('timerDisplay');
    const fill = document.getElementById('timerFill');
    if(disp) {
      disp.textContent = `⏱ ${m}:${s}`;
      if(state.secondsLeft <= 30) disp.classList.add('urgent');
    }
    if(fill) fill.style.width = (state.secondsLeft/TOTAL_SECONDS*100)+'%';
    if(state.secondsLeft <= 0) { clearInterval(state.timerInterval); if(onDone) onDone(); }
  }, 1000);
}

function stopTimer() { if(state.timerInterval) clearInterval(state.timerInterval); }

async function gradeCode(code, qIdx) {
  const prompt = questions[qIdx].testPrompt.replace('{CODE}', code);
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 400,
      system: 'Bạn là giáo viên chấm code ngắn gọn. Chỉ trả về JSON thuần, không markdown.',
      messages: [{role:'user', content: prompt}]
    })
  });
  const data = await res.json();
  const text = data.content.map(b=>b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

function setRobotMood(mood) {
  ['robot-left','robot-right'].forEach(id => {
    const el = document.getElementById(id); if(!el) return;
    const svg = el.querySelector('svg'); if(!svg) return;
    svg.className = mood==='excited' ? 'robot-excited' : 'robot-bounce';
  });
}

function emojiRain() {
  const rain = document.getElementById('emojiRain'); rain.innerHTML='';
  for(let i=0;i<15;i++){
    const e = document.createElement('span'); e.className='e-particle'; e.textContent = '🎉';
    e.style.cssText=`left:${Math.random()*100}%;animation-duration:${1.5+Math.random()*2}s;font-size:20px`;
    rain.appendChild(e);
  }
}

function renderNameScreen() {
  state.screen = 'name';
  document.getElementById('timerDisplay').style.display = 'none';
  document.getElementById('center-area').innerHTML = `<div style="font-size:16px;font-weight:900;color:var(--accent)">Sẵn sàng chiến đấu?</div>`;
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">🤖 Đăng ký tham gia</div>
    <input class="name-input" id="nameInput" placeholder="Nhập tên của bạn..." maxlength="20" autocomplete="off"/>
    <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="joinGame()">🚀 Vào phòng chờ</button>
    <button class="btn btn-secondary" style="width:100%" onclick="openBoard()">🏆 Xem bảng xếp hạng</button>
  </div>
  <div class="teacher-panel">
    <div class="teacher-label">👩‍🏫 Dành cho Giáo viên</div>
    <div style="font-size:12px;color:#4F3A93;margin-bottom:10px;font-weight:600">Bấm nút khi toàn bộ học sinh đã vào phòng chờ công khai thành công:</div>
    <button class="btn btn-teacher" style="width:100%" onclick="teacherStartGame()">▶ KÍCH HOẠT: Bắt đầu cho toàn lớp</button>
  </div>`;
  document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });
}

async function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ document.getElementById('nameInput').style.borderColor='#C0392B'; return; }
  state.playerName = name;
  
  try {
    // Thêm học sinh vào phòng chờ Firebase công khai
    const snap = await db.ref(`${ARENA_ROOT}/waiting`).once('value');
    let list = snap.val() || [];
    if (!list.includes(name)) list.push(name);
    await db.ref(`${ARENA_ROOT}/waiting`).set(list);
    
    renderWaitingScreen();
  } catch(e) {
    console.error("Lỗi đồng bộ Firebase:", e);
    alert("❌ Không thể kết nối Firebase! Bạn đã Tạo Database và mở khoá Tab 'Rules' thành true chưa?");
  }
}

function renderWaitingScreen() {
  state.screen = 'waiting';
  setRobotMood('idle');
  document.getElementById('center-area').innerHTML = `<div style="font-size:14px;font-weight:900;color:var(--accent)">Phòng chờ trực tuyến</div>`;
  document.getElementById('main-content').innerHTML = `
  <div class="card wait-screen">
    <div class="wait-title">🕐 Đang chờ Giáo viên...</div>
    <div class="wait-sub">Trò chơi sẽ tự động chuyển tiếp ngay khi Giáo viên bấm nút kích hoạt!</div>
    <div style="background:var(--surface2);border-radius:14px;padding:12px;margin-bottom:12px">
      <div class="wait-room" id="waitGrid"><div style="color:var(--muted);font-size:13px;width:100%">Đang tải học sinh online...</div></div>
    </div>
  </div>`;
  
  // Kích hoạt lắng nghe Realtime lập tức
  startWaitingListeners();
}

async function teacherStartGame() {
  if(!confirm('Xác nhận kích hoạt và bắt đầu trận đấu cho toàn bộ học sinh?')) return;
  try {
    // Ghi tín hiệu kích hoạt lên Firebase Realtime Database
    await db.ref(`${ARENA_ROOT}/gameStarted`).set(1);
    alert('✅ Đã phát lệnh thành công! Màn hình các máy học sinh đang đồng loạt tự chuyển đổi.');
  } catch(error) {
    console.error("Lỗi Firebase:", error);
    alert('❌ Lỗi Firebase: Không ghi được lệnh! Vui lòng kiểm tra tab Rules.');
  }
}

function startCountdown() {
  stopWaitingListeners();
  let n = 3;
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  overlay.innerHTML = `<div class="countdown-num" id="countNum">${n}</div><div class="countdown-label">Chuẩn bị làm bài...</div>`;
  document.body.appendChild(overlay);

  const tick = () => {
    n--;
    if(n > 0) {
      const el = document.getElementById('countNum'); if(el) el.textContent = n;
      setTimeout(tick, 900);
    } else {
      document.getElementById('countNum').textContent = '🚀 GO!';
      setTimeout(() => {
        overlay.remove();
        state.startTime = Date.now();
        state.screen = 'game';
        renderGameScreen();
        startTimer(() => timeUp());
      }, 800);
    }
  };
  setTimeout(tick, 900);
}

async function timeUp() {
  if(state.screen === 'finish') return;
  const totalScore = (state.scores[0]||0)+(state.scores[1]||0);
  await saveScore(state.playerName, totalScore, TOTAL_SECONDS);
  state.screen = 'finish';
  renderFinishScreen(totalScore, TOTAL_SECONDS, true);
}

function renderGameScreen() {
  const q = questions[state.currentQ];
  document.getElementById('center-area').innerHTML = `<div style="font-size:14px;font-weight:900;color:var(--accent)">Câu ${state.currentQ+1}/${questions.length}: ${q.title}</div>`;
  document.getElementById('main-content').innerHTML = `
  <div class="progress-bar"><div class="progress-fill" style="width:${(state.currentQ/questions.length)*100}%"></div></div>
  <div class="tab-row">
    ${questions.map((qq,i)=>`<button class="tab ${i===state.currentQ?'active':''} ${state.scores[i]!==null?'done':''}" onclick="switchQ(${i})">Câu ${i+1}</button>`).join('')}
  </div>
  <div class="card">
    <div class="question-text">${q.desc}</div>
    <div class="editor-wrap">
      <textarea id="codeEditor">${state.codes[state.currentQ] || q.placeholder}</textarea>
    </div>
    <div id="result-area"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="submitBtn" onclick="submitCode()">🚀 Nộp bài & Chấm điểm</button>
    </div>
    ${state.scores.every(s=>s!==null) ? `<div class="btn-row"><button class="btn btn-next" onclick="finishGame()">🏁 Hoàn thành & Xem kết quả</button></div>`:''}
  </div>`;
  if(state.scores[state.currentQ]!==null) showStoredResult();
}

function switchQ(i) {
  state.codes[state.currentQ] = document.getElementById('codeEditor').value; state.currentQ = i; renderGameScreen();
}

function showStoredResult() {
  const fb = state.feedbacks[state.currentQ];
  document.getElementById('result-area').innerHTML=`<div class="result-box show pass"><div class="result-score pass">${fb.emoji} ${state.scores[state.currentQ]}/10</div><div>${fb.feedback}</div></div>`;
}

async function submitCode() {
  const code = document.getElementById('codeEditor').value.trim();
  state.codes[state.currentQ] = code;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = "AI đang chấm điểm...";
  try {
    const result = await gradeCode(code, state.currentQ);
    state.scores[state.currentQ] = result.score; state.feedbacks[state.currentQ] = result;
    if(result.pass) { setRobotMood('excited'); emojiRain(); }
  } catch(e) {
    state.scores[state.currentQ] = 5; state.feedbacks[state.currentQ] = {score:5,feedback:'Mạng lỗi nhẹ, AI tặng tạm 5đ!','emoji':'📝'};
  }
  renderGameScreen();
}

async function finishGame() {
  stopTimer();
  const totalScore = (state.scores[0]||0)+(state.scores[1]||0);
  const elapsed = Math.round((Date.now()-state.startTime)/1000);
  await saveScore(state.playerName, totalScore, elapsed);
  renderFinishScreen(totalScore, elapsed, false);
}

async function renderFinishScreen(totalScore, elapsed, isTimeUp) {
  state.screen = 'finish';
  document.getElementById('main-content').innerHTML=`
  <div class="card finish-banner">
    <div class="finish-title">🎉 Trận đấu kết thúc!</div>
    <div class="total-score">${totalScore} <span style="font-size:18px;color:var(--muted)">/20 Điểm</span></div>
    <div class="btn-row" style="margin-top:15px">
      <button class="btn btn-primary" onclick="openBoard()">🏆 Xem Bảng Xếp Hạng Lớp</button>
      <button class="btn btn-secondary" onclick="playAgain()">🔄 Thoát ra</button>
    </div>
  </div>`;
}

async function openBoard() {
  state.screen = 'totalboard'; stopWaitingListeners();
  document.getElementById('main-content').innerHTML=`
  <div class="card">
    <div class="card-title">🏆 Bảng Điểm Thi Đua Toàn Lớp</div>
    <div id="total-board">Đang tải bảng điểm...</div>
    <button class="btn btn-secondary" style="width:100%;margin-top:12px" onclick="teacherResetGame()">🔄 Giáo viên: Reset phòng đấu</button>
    <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="playAgain()">🎮 Quay lại từ đầu</button>
  </div>`;
  const board = await getBoard();
  document.getElementById('total-board').innerHTML = board.map((p,i)=>`
    <div style="display:flex;justify-content:between;padding:8px;border-bottom:1px solid var(--border);font-size:14px">
      <b>#${i+1} ${p.name}</b> — <span>${p.score}đ (${p.time}s)</span>
    </div>`).join('') || 'Chưa có ai nộp bài!';
}

async function teacherResetGame() {
  if(!confirm('Xoá toàn bộ dữ liệu phòng chờ và bảng điểm cũ để chơi lượt mới?')) return;
  try {
    await db.ref(`${ARENA_ROOT}/gameStarted`).set(0);
    await db.ref(`${ARENA_ROOT}/waiting`).set([]);
    await db.ref(`${ARENA_ROOT}/board`).set([]);
    alert('✅ Đã làm sạch phòng đấu! Học sinh có thể F5 trang để tham gia lượt mới.');
    playAgain();
  } catch(e){ alert('Lỗi: '+e.message); }
}

function playAgain() { stopTimer(); stopWaitingListeners(); state.codes=['','']; state.scores=[null,null]; renderNameScreen(); }

renderNameScreen();
</script>
</body>
</html>
